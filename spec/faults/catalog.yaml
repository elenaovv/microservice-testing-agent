  - id: UC-ADM-014
    name: Delete Station
    note: UC asserts other records remain — direct surface for OVERREACH.
    faults:

      - id: F-ADM-014-01
        operator: NO-OP
        violates_criterion: "after refresh or reload, the deleted station record no longer appears in the station list"
        oracle_assertion: "post-delete refresh: target station absent from list"
        expected_detection: yes
        mutations:
          - match: { method: DELETE, path_pattern: '^/api/v1/adminbasicservice/adminbasic/stations/[^/]+$' }
            action:
              type: respond
              status: 200
              body_inline: '{"status":1,"msg":"ok","data":"injected: delete accepted but not committed"}'

      - id: F-ADM-014-02
        operator: OVERREACH
        violates_criterion: "other station records remain visible when the list contains more than the deleted station"
        oracle_assertion: "post-delete refresh: list size decreased by exactly 1"
        expected_detection: yes
        mutations:
          - match: { method: DELETE, path_pattern: '^/api/v1/adminbasicservice/adminbasic/stations/[^/]+$' }
            action:
              type: respond
              status: 200
              body_inline: '{"status":1,"msg":"ok","data":"injected"}'
          - match: { method: GET, path_pattern: '^/api/v1/adminbasicservice/adminbasic/stations$' }
            action:
              type: transform
              transformer: drop_records_from_array
              args:
                array_path: data
                count: 2
              note: >
                Real delete intercepted (no DB change). Read mutation drops
                two records from the visible list — matching the user's
                deletion target visually plus one extra, so list size
                appears to shrink by 2.

      - id: F-ADM-014-03
        operator: STALE-READ
        violates_criterion: "after refresh or reload, the deleted station record no longer appears in the station list"
        oracle_assertion: "post-delete refresh: target station absent from list"
        expected_detection: yes
        mutations:
          - match: { method: DELETE, path_pattern: '^/api/v1/adminbasicservice/adminbasic/stations/[^/]+$' }
            action:
              type: respond
              status: 200
              body_inline: '{"status":1,"msg":"ok","data":"injected"}'

      - id: F-ADM-014-04
        operator: REJECT-VALID
        violates_criterion: "the delete action is submitted successfully"
        oracle_assertion: delete submission yields a success indicator
        expected_detection: yes
        mutations:
          - match: { method: DELETE, path_pattern: '^/api/v1/adminbasicservice/adminbasic/stations/[^/]+$' }
            action:
              type: respond
              status: 400
              body_inline: '{"status":0,"msg":"injected: delete refused"}'

  - id: UC-ADM-027
    name: Update System Configuration
    note: Like UC-ADM-007, this UC asserts unmodified fields stay unchanged — strong OVERREACH surface.
    faults:

      - id: F-ADM-027-01
        operator: NO-OP
        violates_criterion: "after refresh or reload, the same configuration entry displays the submitted Value"
        oracle_assertion: "post-update refresh: Value equals submitted value"
        expected_detection: yes
