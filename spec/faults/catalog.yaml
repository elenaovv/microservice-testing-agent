# TrainTicket fault-seeding catalog (research/fault-evaluation)
#
# Each fault is bound to a single use case. The fault's observable surface MUST
# overlap with at least one of that use case's success_criteria, otherwise the
# pair is methodologically void (see the S7-on-UC-VIS-002 incident).
#
# Detection rule (from core/mutation_utils.py): original test passed AND mutant
# retest failed on the same generated test.
#
# Faults are injected at the HTTP boundary visible to the browser via mitmproxy
# (see research/preflight/). State-changing writes are intercepted and never
# reach the MSA, so train-ticket's database stays clean across runs. Faults
# whose effect would otherwise propagate to backend state are simulated via
# response mutation.
#
# Before any treatment runs, every (use_case, fault) pair MUST be validated by
# its handcrafted oracle test (see oracle_assertion). If the oracle does not
# fail under the seeded fault, the pair is dropped or flagged equivalent.

version: 2
target_system: train-ticket
detection_rule: original_passed AND mutant_failed
runs_per_pair: 10
treatments: [agentic, direct_baseline]

operators:
  - id: NO-OP
    description: >
      Endpoint returns success status but the underlying state transition is
      skipped. Maps to missing transactional commit, swallowed exception,
      stub-not-implemented, dead handler.
  - id: STALE-READ
    description: >
      Write succeeds and is visible immediately, but a subsequent read returns
      pre-write state. Maps to cache invalidation bugs, replica lag, in-memory
      commit without persistence. Operationally identical to NO-OP within a
      single test run; kept distinct as a taxonomic category.
  - id: FIELD-CORRUPT
    description: >
      Response substitutes a wrong value in a single displayed field while
      keeping shape valid. Maps to wrong-column bugs, off-by-one indexing,
      serialization swaps.
  - id: OVERREACH
    description: >
      Write affects more than its declared scope: an additional field changes,
      an additional record is touched, a cascade fires too broadly. Maps to
      missing WHERE clauses, broken update-mask handling, over-broad cascades.
  - id: REJECT-VALID
    description: >
      State guard rejects an objectively valid request. Maps to broken
      validation rules, off-by-one bounds, stale permission checks.

# ---------------------------------------------------------------------------
# Action types referenced in fault.mutations[].action.type
# ---------------------------------------------------------------------------
#
#   respond     - local response, no forward to MSA
#                 fields: status, body_inline, headers (optional)
#   passthrough - forward to MSA, return response unchanged
#                 fields: (none)
#   transform   - forward to MSA, mutate response before returning to client
#                 fields: transformer (named function in harness), args
#
# Named transformers (implemented in research/preflight/transformers.py)
# ---------------------------------------------------------------------------
#
#   drop_fields_in_response_array
#     args: { array_path: <jsonpath>, fields: [<str>...] }
#     for each item at array_path, remove keys in fields
#   set_response_field
#     args: { path: <jsonpath>, value: <any> }
#     replace a single field value
#   swap_response_field
#     args: { path: <jsonpath>, replacement: <any> }
#     same as set_response_field; alias for readability when intent is text swap
#   drop_records_from_array
#     args: { array_path: <jsonpath>, count: <int> }
#     remove the first `count` items from the array (used for OVERREACH delete)
#   replace_body
#     args: { body_inline: <str> }
#     wholesale replace response body, keep status/headers from MSA
#
# ---------------------------------------------------------------------------

use_cases:

  - id: UC-VIS-001
    name: Login
    note: >
      Login asserts only the positive path. Faults must break the valid-creds
      flow — security-style "accepts invalid" mutants are NOT detectable here
      and must be excluded.
    faults:

      - id: F-VIS-001-01
        operator: REJECT-VALID
        violates_criterion: "the application shows an authenticated user-facing post-login state"
        oracle_assertion: after submitting valid creds, the post-login authenticated header is visible
        expected_detection: yes
        mutations:
          - match: { method: POST, path_pattern: '^/api/v1/users/login$' }
            action:
              type: respond
              status: 401
              body_inline: '{"status":0,"msg":"login_refused_injected"}'

      - id: F-VIS-001-02
        operator: NO-OP
        violates_criterion: "the application shows an authenticated user-facing post-login state"
        oracle_assertion: after submitting valid creds, the post-login authenticated header is visible
        expected_detection: yes
        mutations:
          - match: { method: POST, path_pattern: '^/api/v1/users/login$' }
            action:
              type: respond
              status: 200
              body_inline: '{"status":1,"msg":"ok","data":{"userId":"","username":"","token":""}}'

      - id: F-VIS-001-03
        operator: FIELD-CORRUPT
        violates_criterion: "the application shows an authenticated user-facing post-login state, such as the logged-in username"
        oracle_assertion: post-login header displays the submitted username verbatim
        expected_detection: borderline
        mutations:
          - match: { method: POST, path_pattern: '^/api/v1/users/login$' }
            action:
              type: transform
              transformer: set_response_field
              args:
                path: data.username
                value: wrong_user_injected
              note: >
                If the frontend renders username from JWT claims rather than
                from the JSON body, the transformer must also mutate the JWT.
                This is what makes detection borderline.

  - id: UC-VIS-002
    name: Search for Tickets
    note: >
      The search frontend calls BOTH ts-travel-service AND ts-travel2-service
      (high-speed vs normal trains). The match patterns below cover both via
      `travel2?service` so a single mutation entry handles parallel services.
    faults:

      - id: F-VIS-002-01
        operator: REJECT-VALID
        violates_criterion: "the system returns at least one trip matching the submitted query"
        oracle_assertion: at least one trip row is rendered for the seeded query
        expected_detection: yes
        mutations:
          - match: { method: POST, path_pattern: '^/api/v1/travel2?service/trips/left$' }
            action:
              type: respond
              status: 200
              body_inline: '{"status":1,"msg":"ok","data":[]}'

      - id: F-VIS-002-02
        operator: FIELD-CORRUPT
        violates_criterion: "each returned trip shows identifying trip information"
        oracle_assertion: each result row exposes a non-empty train identifier
        expected_detection: yes
        mutations:
          - match: { method: POST, path_pattern: '^/api/v1/travel2?service/trips/left$' }
            action:
              type: transform
              transformer: drop_fields_in_response_array
              args:
                array_path: data
                fields: [tripId, trainTypeName]

      - id: F-VIS-002-03
        operator: FIELD-CORRUPT
        violates_criterion: "each returned trip shows identifying trip information and seat availability"
        oracle_assertion: each result row exposes seat-availability information for at least one class
        expected_detection: yes
        mutations:
          - match: { method: POST, path_pattern: '^/api/v1/travel2?service/trips/left$' }
            action:
              type: transform
              transformer: drop_fields_in_response_array
              args:
                array_path: data
                fields:
                  - economyClass
                  - confortClass
                  - priceForEconomyClass
                  - priceForConfortClass

      - id: F-VIS-002-04
        operator: OVERREACH
        violates_criterion: "the system returns at least one trip matching the submitted query"
        oracle_assertion: every result row shows the submitted origin and destination
        expected_detection: borderline
        mutations:
          - match: { method: POST, path_pattern: '^/api/v1/travel2?service/trips/left$' }
            action:
              type: transform
              transformer: replace_body
              args:
                body_inline: '{"status":1,"msg":"ok","data":[{"tripId":{"type":"G","number":"9999"},"trainTypeName":"GaoTieFake","startStation":"beijing","terminalStation":"tianjin","startTime":"2026-06-01 08:00:00","endTime":"2026-06-01 10:00:00","economyClass":50,"confortClass":20,"priceForEconomyClass":"100.0","priceForConfortClass":"200.0"}]}'

  - id: UC-VIS-004
    name: Book a Ticket
    note: >
      Booking flow at the browser boundary: search (ts-travel/ts-travel2) →
      preserve (ts-preserve-service). The internal seat-service call is NOT
      visible to the browser; faults that originate inside seat-service are
      simulated by mutating the preserve-service response the browser sees.
    faults:

      - id: F-VIS-004-01
        operator: REJECT-VALID
        violates_criterion: "the application confirms that the booking was placed"
        oracle_assertion: a booking-confirmed indicator is visible after submission
        expected_detection: yes
        mutations:
          - match: { method: POST, path_pattern: '^/api/v1/preserve(other)?service/preserve(Other)?$' }
            action:
              type: respond
              status: 200
              body_inline: '{"status":0,"msg":"Reserve fail. There are no seats available.","data":null}'
              note: "translates the original S7-SEAT-ZERO-AVAILABILITY to its browser-visible consequence"

      - id: F-VIS-004-02
        operator: NO-OP
        violates_criterion: "the booking request completes successfully for the selected trip"
        oracle_assertion: the new order appears in the user's Order List on a follow-up read
        expected_detection: yes
        mutations:
          - match: { method: POST, path_pattern: '^/api/v1/preserve(other)?service/preserve(Other)?$' }
            action:
              type: respond
              status: 200
              body_inline: '{"status":1,"msg":"ok","data":"injected: confirmation without persistence"}'

      - id: F-VIS-004-03
        operator: FIELD-CORRUPT
        violates_criterion: "the user submits the booking confirmation for the selected destination, travel date and seat class"
        oracle_assertion: the confirmation surface shows the submitted seat class verbatim
        expected_detection: borderline
        mutations:
          - match: { method: POST, path_pattern: '^/api/v1/preserve(other)?service/preserve(Other)?$' }
            action:
              type: transform
              transformer: set_response_field
              args:
                path: data.seatClass
                value: WRONG_CLASS_INJECTED

      - id: F-VIS-004-04
        operator: REJECT-VALID
        violates_criterion: "the application confirms that the booking was placed"
        oracle_assertion: a booking-confirmed indicator is visible after submission
        expected_detection: yes
        mutations:
          - match: { method: POST, path_pattern: '^/api/v1/preserve(other)?service/preserve(Other)?$' }
            action:
              type: respond
              status: 400
              body_inline: '{"status":0,"msg":"injected: invalid booking"}'

  - id: UC-VIS-006
    name: Pay for an Order
    faults:

      - id: F-VIS-006-01
        operator: NO-OP
        violates_criterion: 'after refresh or reload, the same target order status changes to "Paid & Not Collected"'
        oracle_assertion: after refresh, the target order shows "Paid & Not Collected"
        expected_detection: yes
        mutations:
          - match: { method: POST, path_pattern: '^/api/v1/inside_pay_service/inside_payment$' }
            action:
              type: respond
              status: 200
              body_inline: '{"status":1,"msg":"ok","data":"injected: payment accepted but not committed"}'

      - id: F-VIS-006-02
        operator: REJECT-VALID
        violates_criterion: "the payment action is submitted successfully for an unpaid order"
        oracle_assertion: payment submission yields a success indicator
        expected_detection: yes
        mutations:
          - match: { method: POST, path_pattern: '^/api/v1/inside_pay_service/inside_payment$' }
            action:
              type: respond
              status: 400
              body_inline: '{"status":0,"msg":"injected: payment refused"}'

      - id: F-VIS-006-03
        operator: STALE-READ
        violates_criterion: 'after refresh or reload, the same target order status changes to "Paid & Not Collected"'
        oracle_assertion: post-payment refresh shows the updated status
        expected_detection: yes
        mutations:
          - match: { method: POST, path_pattern: '^/api/v1/inside_pay_service/inside_payment$' }
            action:
              type: respond
              status: 200
              body_inline: '{"status":1,"msg":"ok","data":"injected: payment accepted (stale-read sim)"}'

      - id: F-VIS-006-04
        operator: FIELD-CORRUPT
        violates_criterion: 'after refresh or reload, the same target order status changes to "Paid & Not Collected"'
        oracle_assertion: post-payment refresh status text equals "Paid & Not Collected"
        expected_detection: yes
        mutations:
          - match: { method: POST, path_pattern: '^/api/v1/inside_pay_service/inside_payment$' }
            action:
              type: respond
              status: 200
              body_inline: '{"status":1,"msg":"ok","data":"injected"}'
          - match: { method: POST, path_pattern: '^/api/v1/orderservice/order/refresh$' }
            action:
              type: transform
              transformer: set_response_field
              args:
                path: data[*].status
                value: 5
              note: >
                train-ticket order status codes: 0=NotPaid 1=Paid 5=Cancelled.
                After payment intercept, the read mutation forces every order
                row's status to 5 so the post-payment refresh shows "Cancelled".

  - id: UC-VIS-009
    name: Collect a Ticket
    faults:

      - id: F-VIS-009-01
        operator: NO-OP
        violates_criterion: "after refresh or reload, the collected order no longer appears in the Ticket Collect list"
        oracle_assertion: "post-action refresh: target order absent from Collect list"
        expected_detection: yes
        mutations:
          - match: { method: GET, path_pattern: '^/api/v1/executeservice/execute/collected/.+$' }
            action:
              type: respond
              status: 200
              body_inline: '{"status":1,"msg":"ok","data":"injected: collect accepted but not committed"}'

      - id: F-VIS-009-02
        operator: REJECT-VALID
        violates_criterion: "the collect ticket action is submitted successfully for an eligible order"
        oracle_assertion: collect submission yields a success indicator
        expected_detection: yes
        mutations:
          - match: { method: GET, path_pattern: '^/api/v1/executeservice/execute/collected/.+$' }
            action:
              type: respond
              status: 400
              body_inline: '{"status":0,"msg":"injected: collect refused"}'

      - id: F-VIS-009-03
        operator: STALE-READ
        violates_criterion: "after refresh or reload, the collected order no longer appears in the Ticket Collect list"
        oracle_assertion: "post-action refresh: target order absent from Collect list"
        expected_detection: yes
        mutations:
          - match: { method: GET, path_pattern: '^/api/v1/executeservice/execute/collected/.+$' }
            action:
              type: respond
              status: 200
              body_inline: '{"status":1,"msg":"ok","data":"injected"}'

  - id: UC-VIS-010
    name: Enter Station
    faults:

      - id: F-VIS-010-01
        operator: NO-OP
        violates_criterion: "after refresh or reload, the entered order no longer appears in the Enter Station list"
        oracle_assertion: "post-action refresh: target order absent from Enter Station list"
        expected_detection: yes
        mutations:
          - match: { method: GET, path_pattern: '^/api/v1/executeservice/execute/execute/.+$' }
            action:
              type: respond
              status: 200
              body_inline: '{"status":1,"msg":"ok","data":"injected: enter accepted but not committed"}'

      - id: F-VIS-010-02
        operator: REJECT-VALID
        violates_criterion: "the enter station action is submitted successfully for an eligible order"
        oracle_assertion: enter-station submission yields a success indicator
        expected_detection: yes
        mutations:
          - match: { method: GET, path_pattern: '^/api/v1/executeservice/execute/execute/.+$' }
            action:
              type: respond
              status: 400
              body_inline: '{"status":0,"msg":"injected: enter refused"}'

      - id: F-VIS-010-03
        operator: STALE-READ
        violates_criterion: "after refresh or reload, the entered order no longer appears in the Enter Station list"
        oracle_assertion: "post-action refresh: target order absent from Enter Station list"
        expected_detection: yes
        mutations:
          - match: { method: GET, path_pattern: '^/api/v1/executeservice/execute/execute/.+$' }
            action:
              type: respond
              status: 200
              body_inline: '{"status":1,"msg":"ok","data":"injected"}'

  - id: UC-ADM-001
    name: Add User
    note: >
      Verify against frontend network trace which endpoint the admin add-user
      flow actually calls (POST /api/v1/userservice/users/register vs POST
      /api/v1/auth) and which endpoint serves the admin user list (GET
      /api/v1/users vs GET /api/v1/userservice/users) before injection. Below
      uses the most likely combination based on spec/msa.yaml.
    faults:

      - id: F-ADM-001-01
        operator: NO-OP
        violates_criterion: "the new account appears in the user list"
        oracle_assertion: post-create user list contains the submitted username
        expected_detection: yes
        mutations:
          - match: { method: POST, path_pattern: '^/api/v1/adminuserservice/users$' }
            action:
              type: respond
              status: 200
              body_inline: '{"status":1,"msg":"ok","data":"injected: registration accepted but not persisted"}'

      - id: F-ADM-001-02
        operator: FIELD-CORRUPT
        violates_criterion: "the displayed username matches the submitted username"
        oracle_assertion: list row for the new user shows the submitted username verbatim
        expected_detection: yes
        mutations:
          - match: { method: GET, path_pattern: '^/api/v1/adminuserservice/users$' }
            action:
              type: transform
              transformer: set_response_field
              args:
                path: data[-1].username
                value: wrong_username_injected

      - id: F-ADM-001-03
        operator: FIELD-CORRUPT
        violates_criterion: "the displayed email matches the submitted email when the list exposes email values"
        oracle_assertion: list row for the new user shows the submitted email verbatim
        expected_detection: yes
        mutations:
          - match: { method: GET, path_pattern: '^/api/v1/adminuserservice/users$' }
            action:
              type: transform
              transformer: set_response_field
              args:
                path: data[-1].email
                value: wrong_email_injected@example.invalid

      - id: F-ADM-001-04
        operator: REJECT-VALID
        violates_criterion: "the create action is submitted successfully"
        oracle_assertion: create submission yields a success indicator
        expected_detection: yes
        mutations:
          - match: { method: POST, path_pattern: '^/api/v1/adminuserservice/users$' }
            action:
              type: respond
              status: 400
              body_inline: '{"status":0,"msg":"injected: registration refused"}'

  - id: UC-ADM-007
    name: Update Train
    note: This UC asserts non-modified fields stay unchanged — strong OVERREACH surface.
    faults:

      - id: F-ADM-007-01
        operator: NO-OP
        violates_criterion: "after refresh or reload, the same target train record displays the newly assigned AverageSpeed"
        oracle_assertion: "post-update refresh: AverageSpeed equals submitted value"
        expected_detection: yes
        mutations:
          - match: { method: PUT, path_pattern: '^/api/v1/adminbasicservice/adminbasic/trains$' }
            action:
              type: respond
              status: 200
              body_inline: '{"status":1,"msg":"ok","data":"injected: update accepted but not committed"}'

      - id: F-ADM-007-02
        operator: OVERREACH
        violates_criterion: "all unmodified attributes of the target train (Name, Economy Class, Comfort Class) retain their original values exactly"
        oracle_assertion: "post-update refresh: Name, Economy Class, Comfort Class equal pre-update snapshot"
        expected_detection: yes
        mutations:
          - match: { method: PUT, path_pattern: '^/api/v1/adminbasicservice/adminbasic/trains$' }
            action:
              type: respond
              status: 200
              body_inline: '{"status":1,"msg":"ok","data":"injected"}'
          - match: { method: GET, path_pattern: '^/api/v1/adminbasicservice/adminbasic/trains$' }
            action:
              type: transform
              transformer: set_response_field
              args:
                path: data[*].economyClass
                value: 0
              note: >
                Forge the read so AverageSpeed appears updated (per the user
                action) AND Economy Class appears nullified (the overreach
                effect). Harness must inspect the captured PUT request body
                to know which submitted AverageSpeed to echo back.

      - id: F-ADM-007-03
        operator: STALE-READ
        violates_criterion: "after refresh or reload, the same target train record displays the newly assigned AverageSpeed"
        oracle_assertion: "post-update refresh: AverageSpeed equals submitted value"
        expected_detection: yes
        mutations:
          - match: { method: PUT, path_pattern: '^/api/v1/adminbasicservice/adminbasic/trains$' }
            action:
              type: respond
              status: 200
              body_inline: '{"status":1,"msg":"ok","data":"injected"}'

      - id: F-ADM-007-04
        operator: FIELD-CORRUPT
        violates_criterion: "after refresh or reload, the same target train record displays the newly assigned AverageSpeed"
        oracle_assertion: "post-update refresh: AverageSpeed equals submitted value exactly"
        expected_detection: yes
        mutations:
          - match: { method: PUT, path_pattern: '^/api/v1/adminbasicservice/adminbasic/trains$' }
            action:
              type: respond
              status: 200
              body_inline: '{"status":1,"msg":"ok","data":"injected"}'
          - match: { method: GET, path_pattern: '^/api/v1/adminbasicservice/adminbasic/trains$' }
            action:
              type: transform
              transformer: set_response_field
              args:
                path: data[*].averageSpeed
                value: -1
              note: >
                Write intercepted (no DB mutation). Read mutation forces every
                row's averageSpeed to a sentinel that no test would have
                submitted, so the post-update assertion fails.

  - id: UC-ADM-013
    name: Add Station
    faults:

      - id: F-ADM-013-01
        operator: NO-OP
        violates_criterion: "the new station appears in the station list with the submitted station name"
        oracle_assertion: post-create station list contains the submitted name
        expected_detection: yes
