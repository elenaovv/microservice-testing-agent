      - id: F-ADM-037-03
        operator: FIELD-CORRUPT
        violates_criterion: "the application shows an authenticated admin post-login state, such as a management panel, admin navigation"
        oracle_assertion: admin-only navigation surface is visible after login
        expected_detection: borderline
        mutations:
          - match: { method: POST, path_pattern: '^/api/v1/users/login$' }
            action:
