##############################################################################
# TrainTicket MSA Specification - documentation-derived architecture baseline
#
# Purpose:
# - Domain context for prompt generation
# - Endpoint/service mapping input for coverage inference
#
# Notes:
# - Endpoint entries are compiled from TrainTicket public wiki/API documentation
# - The wiki has minor path-format inconsistencies (leading slash, casing, and
#   occasional typos). Canonical forms are preserved where unambiguous and
#   inconsistencies are documented in x_path_normalization.
##############################################################################

msa:
  gateway:
    description: "The ts-ui-dashboard gateway reverse-proxies API calls under /api/v1/* to backend services."
    usage_note: "All browser and test traffic should target the UI gateway BASE_URL."

  known_credentials:
    client_user:
      username: fdse_microservice
      password: "111111"
      role: ROLE_USER
    admin_user:
      username: admin
      password: "222222"
      role: ROLE_ADMIN

  services:
    ts-auth-service:
      summary: "Authentication and user auth-related CRUD."
      x_doc_ref:
        page: https://github.com/FudanSELab/train-ticket/wiki/Service-Guide-and-API-Reference
        section: ts-auth-service
        anchor: https://github.com/FudanSELab/train-ticket/wiki/Service-Guide-and-API-Reference#ts-auth-service
      x_endpoint_confidence: exact
      endpoints:
      - path: /api/v1/users/login
        method: POST
        description: Login check and token dispatch.
      - path: /api/v1/auth
        method: POST
        description: Create user in auth context.
      - path: /api/v1/users
        method: GET
        description: Get all users.
      - path: /api/v1/users/{userId}
        method: DELETE
        description: Delete one user.

    ts-verification-code-service:
      summary: "Captcha image generation and verify-code checks."
      x_doc_ref:
        page: https://github.com/FudanSELab/train-ticket/wiki/Service-Guide-and-API-Reference
        section: ts-verification-code-service
        anchor: https://github.com/FudanSELab/train-ticket/wiki/Service-Guide-and-API-Reference#ts-verification-code-service
      x_endpoint_confidence: exact
      endpoints:
      - path: /api/v1/verifycode/generate
        method: GET
        description: Generate verification code image.
      - path: /api/v1/verifycode/verify/{verifyCode}
        method: GET
        description: Verify user-submitted captcha code.

    ts-user-service:
      summary: "User profile service."
      x_doc_ref:
        page: https://github.com/FudanSELab/train-ticket/wiki/Service-Guide-and-API-Reference
        section: ts-user-service
        anchor: https://github.com/FudanSELab/train-ticket/wiki/Service-Guide-and-API-Reference#ts-user-service
      x_endpoint_confidence: exact
      endpoints:
      - path: /api/v1/userservice/users
        method: GET
        description: Get all users.
      - path: /api/v1/userservice/users/{userName}
        method: GET
        description: Get user by username.
      - path: /api/v1/userservice/users/id/{userId}
        method: GET
        description: Get user by id.
      - path: /api/v1/userservice/users/register
        method: POST
        description: Register new user.
      - path: /api/v1/userservice/users/{userId}
        method: DELETE
        description: Delete user by id.

    ts-admin-user-service:
      summary: "Admin CRUD for user management."
      x_doc_ref:
        page: https://github.com/FudanSELab/train-ticket/wiki/Service-Guide-and-API-Reference
        section: ts-admin-user-service
