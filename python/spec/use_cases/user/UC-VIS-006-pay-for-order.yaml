id: UC-VIS-006
role: user
name: Pay for an Order
preconditions:
  authenticated_as: ROLE_USER
  state:
    - the traveler has an existing unpaid order
goal: The traveler submits payment for an existing order to confirm the reservation.
success_criteria:
  - the order status changes to "Paid & Not Collected"
  - the seat is reserved for the traveler